<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <style>
       
    </style>
</head>
<body>
    <h1 style="text-align: center; text-decoration: dashed;">Course Registration form </h1>
    <form autocomplete="on">
   
       <fieldset style="width: fit-content;">
          <legend>Personal Details</legend>
         <table>
   <tr> <td><label for="first name">first name</label></td>
    
   <td> <input type="text" placeholder="Ex:Balayya Babu"></td>
    </tr>
   <tr><td> <label for="Surname">Surname</label></td>
    <td><input type="text" placeholder="ex:Nandamuri"></td> </tr>
    <tr><td> <label for="mobnum">Mobile number</label></td>
       <td> <input type="tel" placeholder="ex:999999999"> </td></tr>
        <tr><td> <label for="email">Email</label></td>
        <td><input type="email" placeholder="ex:123@gmail.com"></td></tr>
        <tr><td><label for="password">password</label></td>
        <td><input type="password" placeholder="min 6 characters"></td></tr>
        <tr><td><label for="password">confirm password</label></td>
       <td ><input type="password" placeholder="min 6 characters"></td></tr>
       <tr><td> <label for="dob">DOB</label></td>
       <td> <input type="date"></td></tr>
        <tr><td><label for="gender">Gender</label></td>
       <td> <input name="gender" type="radio" value="Male"> <label>Male</label>
        <input name="gender" type="radio" value="Female"> <label>Female</label>
        <input name="gender" type="radio" value="Rather not say"> <label>Rather not say</label></td></tr>
        <tr><td><label for="country">select country</label></td>
       <td> <select>
            <option value="">----select your country-----</option>
            <option value="INDIA">INDIA</option>
            <option value="USA">USA</option>
            <option value="UK">UK </option>
        </select></td></tr>
        <tr><td><label for="picture">Upload Picture</label></td>
        <td><input type="file" multiple></td></tr>
        <tr><td><input type="reset"></td></tr>
        &nbsp;
        <tr><td><input type="submit"></td></tr>
    
    </table>
       </fieldset>
    </form>
    <form>
        <fieldset style="width: 380px;">
        <table>
           
                <legend>Course Details</legend>
        <tr><td><label for="Course">Course</label></td>
        <td><select>
            <option value="Python full stack">Python full stack</option>
            <option value="Java full stack">Java full stack</option>
            <option value="MERN full stack">MERN full stack</option></td></tr>
        </select>
        <tr><td>
            <label for="mode">Course Mode</label>
            <td>
                <input type="radio" name="mode" value="offline"><label >offline</label>
                <input type="radio" name="mode" value="online"><label >online</label>
            </td>
        </td></tr>
        <tr>
            <td>
                <label for="comments">Comments</label>
            </td>
        </tr>
        </table>
                <textarea style="resize:none;" rows="7" cols="40"></textarea>
                 <br> 
                <input type="reset" name="" id="">
                <input type="submit" name="" id="">
        
    </form>
</fieldset>
</body>
</html>
